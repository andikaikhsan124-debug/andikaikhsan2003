<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andika Nur Ikhsan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(270deg,#7f5af0,#ff6ec7,#5f9cff);
background-size:600% 600%;
animation: gradientMove 10s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:90%;
max-width:400px;
padding:20px;
backdrop-filter: blur(10px);
background: rgba(255,255,255,0.1);
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* Anime Character */

.anime{
width:140px;
margin:auto;
animation: float 3s ease-in-out infinite;
}

.anime img{
width:100%;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0px)}
}

h1{
margin-top:10px;
font-size:22px;
}

.bio{
opacity:0.8;
margin-bottom:20px;
}

/* Buttons */

.link{
display:block;
text-decoration:none;
color:white;
padding:14px;
margin:12px 0;
border-radius:30px;
font-weight:bold;
background: linear-gradient(45deg,#ff6ec7,#7f5af0);
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.link:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,255,255,0.6);
}

/* sparkle animation */

.sparkle{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:spark 5s linear infinite;
opacity:0.7;
}

@keyframes spark{
0%{
transform:translateY(100vh) scale(0);
}
100%{
transform:translateY(-10vh) scale(1);
}
}

footer{
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="anime">
<img src="https://i.imgur.com/6RL4QyT.png">
</div>

<h1>Andika Nur Ikhsan</h1>
<p class="bio">✨ Welcome to my digital space</p>

<a class="link" href="https://wa.me/6283157181051">Chat me on WhatsApp</a>

<a class="link" href="https://tiktok.com/@andika_nur_ikhsan">Follow my TikTok</a>

<a class="link" href="https://instagram.com/dikaa_ikhsaan">Follow my Instagram</a>

<footer>
© 2026 Andika Nur Ikhsan
</footer>

</div>

<!-- Sparkle Effects -->

<div class="sparkle" style="left:10%"></div>
<div class="sparkle" style="left:30%"></div>
<div class="sparkle" style="left:50%"></div>
<div class="sparkle" style="left:70%"></div>
<div class="sparkle" style="left:90%"></div>

</body>
</html>
